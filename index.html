<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">
        <button id="add-btn" class="add-btn" type="button">Add New Employee</button>

        <div id="employee-modal" class="modal" style="display: none">
            <form id="employee-form">
                <input type="text" id="employeeId" name="employeeId" placeholder="Employee ID" required
                    pattern="^[A-Za-z0-9-]+$">
                <input type="text" id="name" name="name" placeholder="Name" required>
                <input type="date" id="dob" name="dob" required>
                <input type="text" id="ssn" name="ssn" placeholder="SSN (e.g., 000-00-0000)" required
                    pattern="^\d{3}-\d{2}-\d{4}$">
                <select id="gender" name="gender" required>
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <textarea id="address" name="address" placeholder="Address" required></textarea>
                <input type="tel" id="phone" name="phone" placeholder="Phone (10-digit)" required pattern="^\d{10}$">
                <input type="email" id="email" name="email" placeholder="Email" required>
                <select id="preferredCommunication" name="preferredCommunication" required>
                    <option value="">Select preferredCommunication</option>
                    <option value="Email">Email</option>
                    <option value="Phone">Phone</option>
                </select>
                <input type="text" id="jobTitle" name="jobTitle" placeholder="Job Title" required>
                <select id="department" name="department" required>
                    <option value="">Select department</option>
                    <option value="Sales">Sales</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Human Resources">Human Resources</option>
                    <option value="Finance">Finance</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Information Technology (IT)">Information Technology (IT)</option>
                    <option value="Customer Support">Customer Support</option>
                    <option value="Design">Design</option>
                </select>
                <input type="number" id="salary" name="salary" placeholder="Salary" required min="1">
                <button type="submit">Save</button>
                <button type="button" id="cancel-btn">Cancel</button>
            </form>
        </div>

        <table id="employee-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>DOB</th>
                    <th>SSN</th>
                    <th>Gender</th>
                    <th>Address</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Preferred Comms</th>
                    <th>Job Title</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="employee-tbody"></tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
