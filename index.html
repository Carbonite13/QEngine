<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light py-5">
    <div id="app" class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-secondary mb-0">Employee Management System</h2>
            <button id="addBtn" class="btn btn-primary" type="button">Add New Employee</button>
        </div>

        <div id="employeeModal" class="modal fade" tabindex="-1" aria-hidden="true"
            style="background: rgba(0,0,0,0.5);">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content shadow">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Employee Details</h5>
                        <button type="button" class="btn-close" id="closeHeaderBtn" aria-label="Close"></button>
                    </div>
                    <form id="employeeForm" novalidate>
                        <div class="modal-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="employeeId" class="form-label small fw-bold text-muted">Employee
                                        ID</label>
                                    <input type="text" id="employeeId" name="employeeId" class="form-control"
                                        placeholder="EIMS-001">
                                    <div id="employeeIdError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="name" class="form-label small fw-bold text-muted">Full Name</label>
                                    <input type="text" id="name" name="name" class="form-control"
                                        placeholder="John Doe">
                                    <div id="nameError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="dob" class="form-label small fw-bold text-muted">Date of Birth</label>
                                    <input type="date" id="dob" name="dob" class="form-control">
                                    <div id="dobError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="ssn" class="form-label small fw-bold text-muted">SSN</label>
                                    <input type="text" id="ssn" name="ssn" class="form-control"
                                        placeholder="000-00-0000">
                                    <div id="ssnError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="gender" class="form-label small fw-bold text-muted">Gender</label>
                                    <select id="gender" name="gender" class="form-select">
                                        <option value="">Select gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <div id="genderError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label small fw-bold text-muted">Phone Number</label>
                                    <input type="tel" id="phone" name="phone" class="form-control"
                                        placeholder="10-digit phone">
                                    <div id="phoneError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label small fw-bold text-muted">Email Address</label>
                                    <input type="email" id="email" name="email" class="form-control"
                                        placeholder="name@company.com">
                                    <div id="emailError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="preferredCommunication"
                                        class="form-label small fw-bold text-muted">Preferred Comms</label>
                                    <select id="preferredCommunication" name="preferredCommunication"
                                        class="form-select">
                                        <option value="">Select method</option>
                                        <option value="Email">Email</option>
                                        <option value="Phone">Phone</option>
                                    </select>
                                    <div id="preferredCommunicationError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="jobTitle" class="form-label small fw-bold text-muted">Job Title</label>
                                    <input type="text" id="jobTitle" name="jobTitle" class="form-control"
                                        placeholder="Software Engineer">
                                    <div id="jobTitleError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="department"
                                        class="form-label small fw-bold text-muted">Department</label>
                                    <select id="department" name="department" class="form-select">
                                        <option value="">Select department</option>
                                        <option value="Sales">Sales</option>
                                        <option value="Marketing">Marketing</option>
                                        <option value="Human Resources">Human Resources</option>
                                        <option value="Finance">Finance</option>
                                        <option value="Engineering">Engineering</option>
                                        <option value="Information Technology (IT)">Information Technology (IT)</option>
                                        <option value="Customer Support">Customer Support</option>
                                        <option value="Design">Design</option>
                                    </select>
                                    <div id="departmentError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-12">
                                    <label for="salary" class="form-label small fw-bold text-muted">Salary ($)</label>
                                    <input type="number" id="salary" name="salary" class="form-control"
                                        placeholder="Annual base pay">
                                    <div id="salaryError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-md-12">
                                    <label for="address" class="form-label small fw-bold text-muted">Physical
                                        Address</label>
                                    <textarea id="address" name="address" class="form-control" rows="2"
                                        placeholder="Street, City, State, ZIP"></textarea>
                                    <div id="addressError" class="invalid-feedback"></div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                            <button type="submit" id="submitBtn" class="btn btn-success">Save Record</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table id="employeeTable" class="table table-hover align-middle mb-0">
                    <thead class="table-light text-uppercase fs-7 tracking-wider">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Name</th>
                            <th>DOB</th>
                            <th>SSN</th>
                            <th>Gender</th>
                            <th>Address</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Preferred Comms</th>
                            <th>Job Title</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th class="pe-3 text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
